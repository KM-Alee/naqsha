# Trusted publishing to PyPI (OIDC). Register this workflow filename on PyPI under
# Account settings → Publishing → pending publisher: workflow name = publish.yml
name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  # Lets you run “Publish to PyPI” from Actions → … → Run workflow (uses selected branch).
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/naqsha
    permissions:
      id-token: write # PyPI trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build wheel and sdist
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
